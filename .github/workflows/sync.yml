name: Sync Rule Sets

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest requests pyyaml

      - name: Install sing-box 1.13.0
        env:
          SING_BOX_VERSION: "1.13.0"
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.local/bin"
          asset="sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz"
          archive="/tmp/${asset}"
          curl -fsSL -o "${archive}" "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/${asset}"
          tar -xzf "${archive}" -C /tmp
          install -m 0755 "/tmp/sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box" "$HOME/.local/bin/sing-box"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          sing-box version

      - name: Run tests
        run: python -m pytest -q

      - name: Generate rule sets
        run: python main.py --links links.txt --output-dir rule --sing-box-bin sing-box

      - name: Commit and push generated files
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A rule
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update generated rule-sets"
          git push
